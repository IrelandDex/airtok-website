<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 375 812" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">
  <defs>
    <linearGradient id="brand-t" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="card-shadow-t" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.06"/>
    </filter>
  </defs>

  <rect width="375" height="812" fill="#f8fafc"/>

  <!-- Status bar -->
  <text x="28" y="28" font-size="14" font-weight="700" fill="#0f172a">9:41</text>
  <g transform="translate(335, 20)" fill="#0f172a">
    <rect width="22" height="11" rx="2.5" fill="none" stroke="#0f172a" stroke-width="1"/>
    <rect x="2" y="2" width="16" height="7" rx="1"/>
  </g>

  <!-- Header -->
  <text x="22" y="86" font-size="32" font-weight="800" fill="#0f172a">传输中</text>
  <g transform="translate(22, 100)">
    <text x="0" y="9" font-size="13" fill="#64748b">发送给 华为 Mate 60</text>
  </g>

  <!-- Active session card -->
  <g transform="translate(22, 130)" filter="url(#card-shadow-t)">
    <rect width="331" height="220" rx="18" fill="#ffffff"/>

    <!-- Title row -->
    <g transform="translate(20, 24)">
      <rect width="44" height="44" rx="10" fill="#fee2e2"/>
      <text x="22" y="30" text-anchor="middle" font-size="22">🎬</text>
      <text x="58" y="22" font-size="15" font-weight="700" fill="#0f172a">vacation-2024.mp4</text>
      <text x="58" y="40" font-size="11" fill="#94a3b8">3 个文件 · 共 4.2 GB</text>
    </g>

    <!-- Progress -->
    <g transform="translate(20, 96)">
      <rect width="291" height="8" rx="4" fill="#e2e8f0"/>
      <rect width="184" height="8" rx="4" fill="url(#brand-t)"/>
    </g>

    <g transform="translate(20, 116)">
      <text x="0" y="14" font-size="13" font-weight="700" fill="#0f172a">63%</text>
      <text x="291" y="14" text-anchor="end" font-size="13" font-weight="600" fill="#0ea5e9">82.4 MB/s</text>
    </g>
    <g transform="translate(20, 136)">
      <text x="0" y="14" font-size="11" fill="#94a3b8">2.6 GB / 4.2 GB</text>
      <text x="291" y="14" text-anchor="end" font-size="11" fill="#94a3b8">还需 19 秒</text>
    </g>

    <!-- Action buttons -->
    <g transform="translate(20, 168)">
      <rect width="140" height="38" rx="10" fill="#f1f5f9"/>
      <text x="70" y="24" text-anchor="middle" font-size="13" font-weight="600" fill="#475569">暂停</text>
    </g>
    <g transform="translate(170, 168)">
      <rect width="141" height="38" rx="10" fill="#fee2e2"/>
      <text x="71" y="24" text-anchor="middle" font-size="13" font-weight="600" fill="#dc2626">取消</text>
    </g>
  </g>

  <!-- File list header -->
  <text x="22" y="384" font-size="13" font-weight="700" fill="#94a3b8">文件列表</text>

  <!-- File items -->
  <g transform="translate(22, 398)" filter="url(#card-shadow-t)">
    <rect width="331" height="60" rx="12" fill="#ffffff"/>
    <rect x="14" y="14" width="32" height="32" rx="8" fill="#e0f2fe"/>
    <text x="30" y="36" text-anchor="middle" font-size="16">🖼</text>
    <text x="56" y="28" font-size="13" font-weight="600" fill="#0f172a">IMG_4382.HEIC</text>
    <text x="56" y="44" font-size="11" fill="#94a3b8">12.4 MB · 已发送</text>
    <g transform="translate(290, 22)">
      <circle cx="10" cy="10" r="10" fill="#22c55e"/>
      <path d="M 6 10 L 9 13 L 14 7" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>
  </g>

  <g transform="translate(22, 470)" filter="url(#card-shadow-t)">
    <rect width="331" height="60" rx="12" fill="#ffffff"/>
    <rect x="14" y="14" width="32" height="32" rx="8" fill="#fef3c7"/>
    <text x="30" y="36" text-anchor="middle" font-size="16">🎬</text>
    <text x="56" y="28" font-size="13" font-weight="600" fill="#0f172a">vacation-2024.mp4</text>
    <text x="56" y="44" font-size="11" fill="#0ea5e9">2.6 GB / 4.2 GB · 进行中</text>
    <g transform="translate(290, 22)">
      <circle cx="10" cy="10" r="10" fill="none" stroke="#0ea5e9" stroke-width="2" stroke-dasharray="50 12" stroke-linecap="round"/>
      <text x="10" y="14" text-anchor="middle" font-size="9" font-weight="700" fill="#0ea5e9">63</text>
    </g>
  </g>

  <g transform="translate(22, 542)">
    <rect width="331" height="60" rx="12" fill="#ffffff" filter="url(#card-shadow-t)"/>
    <rect x="14" y="14" width="32" height="32" rx="8" fill="#f1f5f9"/>
    <text x="30" y="36" text-anchor="middle" font-size="16">📄</text>
    <text x="56" y="28" font-size="13" font-weight="600" fill="#0f172a">slides.pdf</text>
    <text x="56" y="44" font-size="11" fill="#94a3b8">3.2 MB · 等待中</text>
    <g transform="translate(290, 22)">
      <circle cx="10" cy="10" r="10" fill="none" stroke="#cbd5e1" stroke-width="2"/>
    </g>
  </g>

  <!-- Tab bar -->
  <g transform="translate(0, 740)">
    <rect width="375" height="72" fill="#ffffff"/>
    <line x1="0" y1="0" x2="375" y2="0" stroke="#e2e8f0"/>
    <g transform="translate(58, 18)">
      <rect width="24" height="24" rx="4" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
      <text x="12" y="42" text-anchor="middle" font-size="10" fill="#94a3b8">设备</text>
    </g>
    <g transform="translate(176, 18)">
      <rect width="24" height="24" rx="4" fill="#0ea5e9" opacity="0.15"/>
      <text x="12" y="42" text-anchor="middle" font-size="10" font-weight="700" fill="#0ea5e9">传输</text>
    </g>
    <g transform="translate(294, 18)">
      <rect width="24" height="24" rx="4" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
      <text x="12" y="42" text-anchor="middle" font-size="10" fill="#94a3b8">设置</text>
    </g>
  </g>
</svg>
