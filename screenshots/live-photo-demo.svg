<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">
  <defs>
    <linearGradient id="bg-pink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdf2f8"/>
      <stop offset="100%" stop-color="#f3e8ff"/>
    </linearGradient>
    <linearGradient id="phone-iphone" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="phone-android" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="photo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fda4af"/>
      <stop offset="40%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="sun" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="phone-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="20" flood-color="#0f172a" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="800" height="600" fill="url(#bg-pink)"/>

  <!-- Decorative blob -->
  <circle cx="400" cy="300" r="280" fill="#f9a8d4" opacity="0.15"/>

  <!-- iPhone (left) -->
  <g transform="translate(80, 80)" filter="url(#phone-shadow)">
    <!-- Phone frame -->
    <rect x="0" y="0" width="280" height="440" rx="38" fill="url(#phone-iphone)"/>
    <rect x="6" y="6" width="268" height="428" rx="32" fill="#000"/>
    <!-- Notch -->
    <rect x="100" y="6" width="80" height="22" rx="11" fill="#000"/>
    <!-- Screen -->
    <rect x="14" y="34" width="252" height="392" rx="22" fill="#0f172a"/>

    <!-- Photo content -->
    <g transform="translate(14, 34)">
      <!-- Sky background -->
      <rect width="252" height="280" rx="22" fill="url(#photo)"/>
      <!-- Sun -->
      <circle cx="180" cy="80" r="32" fill="url(#sun)"/>
      <!-- Mountains silhouette -->
      <path d="M 0 220 L 60 140 L 110 180 L 160 110 L 220 170 L 252 150 L 252 280 L 0 280 Z" fill="#312e81" opacity="0.7"/>
      <!-- Foreground -->
      <path d="M 0 240 L 80 200 L 140 230 L 200 195 L 252 220 L 252 280 L 0 280 Z" fill="#1e1b4b" opacity="0.9"/>

      <!-- LIVE badge -->
      <g transform="translate(14, 14)">
        <rect width="58" height="24" rx="6" fill="rgba(0,0,0,0.5)"/>
        <circle cx="13" cy="12" r="4" fill="#ffffff"/>
        <circle cx="13" cy="12" r="2" fill="rgba(0,0,0,0.5)"/>
        <text x="22" y="16" font-size="11" font-weight="700" fill="#ffffff">LIVE</text>
      </g>

      <!-- Press to play hint at bottom -->
      <g transform="translate(0, 296)">
        <text x="126" y="20" text-anchor="middle" font-size="11" fill="#94a3b8">长按播放</text>
      </g>

      <!-- Action buttons -->
      <g transform="translate(20, 330)">
        <rect width="212" height="44" rx="12" fill="#0ea5e9"/>
        <text x="106" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">发送到附近设备</text>
      </g>
    </g>

    <!-- Label -->
    <text x="140" y="475" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">iPhone</text>
  </g>

  <!-- Arrow in the middle -->
  <g transform="translate(380, 250)">
    <path d="M 0 0 L 40 0" stroke="#ec4899" stroke-width="3" stroke-linecap="round"/>
    <path d="M 32 -8 L 40 0 L 32 8" stroke="#ec4899" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="20" y="-12" text-anchor="middle" font-size="11" font-weight="700" fill="#ec4899">还在动</text>
  </g>

  <!-- Android phone (right) -->
  <g transform="translate(440, 80)" filter="url(#phone-shadow)">
    <rect x="0" y="0" width="280" height="440" rx="38" fill="url(#phone-android)"/>
    <rect x="6" y="6" width="268" height="428" rx="32" fill="#000"/>
    <!-- Punch-hole camera -->
    <circle cx="140" cy="22" r="6" fill="#000"/>
    <rect x="14" y="34" width="252" height="392" rx="22" fill="#0f172a"/>

    <!-- Same photo content -->
    <g transform="translate(14, 34)">
      <rect width="252" height="280" rx="22" fill="url(#photo)"/>
      <circle cx="180" cy="80" r="32" fill="url(#sun)"/>
      <path d="M 0 220 L 60 140 L 110 180 L 160 110 L 220 170 L 252 150 L 252 280 L 0 280 Z" fill="#312e81" opacity="0.7"/>
      <path d="M 0 240 L 80 200 L 140 230 L 200 195 L 252 220 L 252 280 L 0 280 Z" fill="#1e1b4b" opacity="0.9"/>

      <!-- Motion Photo badge -->
      <g transform="translate(14, 14)">
        <rect width="80" height="24" rx="6" fill="rgba(0,0,0,0.5)"/>
        <circle cx="13" cy="12" r="4" fill="#ffffff"/>
        <circle cx="13" cy="12" r="2" fill="rgba(0,0,0,0.5)"/>
        <text x="22" y="16" font-size="9" font-weight="700" fill="#ffffff">MOTION</text>
      </g>

      <g transform="translate(0, 296)">
        <text x="126" y="20" text-anchor="middle" font-size="11" fill="#94a3b8">收到 · 已存到相册</text>
      </g>

      <g transform="translate(20, 330)">
        <rect width="212" height="44" rx="12" fill="#22c55e"/>
        <text x="106" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">在相册中查看</text>
      </g>
    </g>

    <text x="140" y="475" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">华为 / 三星 / 像素</text>
  </g>
</svg>
