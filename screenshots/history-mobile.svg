<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 375 812" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">
  <defs>
    <filter id="card-shadow-h" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.06"/>
    </filter>
  </defs>

  <rect width="375" height="812" fill="#f8fafc"/>

  <!-- Status bar -->
  <text x="28" y="28" font-size="14" font-weight="700" fill="#0f172a">9:41</text>
  <g transform="translate(335, 20)">
    <rect width="22" height="11" rx="2.5" fill="none" stroke="#0f172a" stroke-width="1"/>
    <rect x="2" y="2" width="16" height="7" rx="1" fill="#0f172a"/>
  </g>

  <text x="22" y="86" font-size="32" font-weight="800" fill="#0f172a">传输历史</text>
  <text x="22" y="108" font-size="13" fill="#64748b">最近 30 天</text>

  <!-- Filter chips -->
  <g transform="translate(22, 130)">
    <rect width="60" height="28" rx="14" fill="#0f172a"/>
    <text x="30" y="18" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">全部</text>

    <g transform="translate(68, 0)">
      <rect width="60" height="28" rx="14" fill="#ffffff" filter="url(#card-shadow-h)"/>
      <text x="30" y="18" text-anchor="middle" font-size="11" fill="#475569">已发送</text>
    </g>
    <g transform="translate(136, 0)">
      <rect width="60" height="28" rx="14" fill="#ffffff" filter="url(#card-shadow-h)"/>
      <text x="30" y="18" text-anchor="middle" font-size="11" fill="#475569">已接收</text>
    </g>
    <g transform="translate(204, 0)">
      <rect width="60" height="28" rx="14" fill="#ffffff" filter="url(#card-shadow-h)"/>
      <text x="30" y="18" text-anchor="middle" font-size="11" fill="#475569">图片</text>
    </g>
  </g>

  <!-- History item 1 -->
  <g transform="translate(22, 184)" filter="url(#card-shadow-h)">
    <rect width="331" height="100" rx="14" fill="#ffffff"/>
    <!-- Thumbnail -->
    <rect x="16" y="16" width="68" height="68" rx="12" fill="#e0f2fe"/>
    <text x="50" y="56" text-anchor="middle" font-size="28">🖼</text>
    <!-- Live badge -->
    <g transform="translate(20, 64)">
      <rect width="34" height="14" rx="3" fill="rgba(0,0,0,0.5)"/>
      <text x="17" y="10" text-anchor="middle" font-size="8" font-weight="700" fill="#ffffff">LIVE</text>
    </g>
    <!-- Info -->
    <text x="100" y="34" font-size="14" font-weight="700" fill="#0f172a">IMG_4382 · Live Photo</text>
    <text x="100" y="52" font-size="11" fill="#64748b">收自 DX 的 iPhone</text>
    <text x="100" y="68" font-size="11" fill="#94a3b8">12.4 MB · 刚刚</text>
    <!-- Save to gallery button -->
    <g transform="translate(100, 76)">
      <rect width="84" height="14" rx="4" fill="#dcfce7"/>
      <text x="42" y="11" text-anchor="middle" font-size="9" font-weight="700" fill="#16a34a">已存入相册</text>
    </g>
  </g>

  <!-- History item 2 -->
  <g transform="translate(22, 296)" filter="url(#card-shadow-h)">
    <rect width="331" height="100" rx="14" fill="#ffffff"/>
    <rect x="16" y="16" width="68" height="68" rx="12" fill="#fef3c7"/>
    <text x="50" y="56" text-anchor="middle" font-size="28">🎬</text>
    <text x="100" y="34" font-size="14" font-weight="700" fill="#0f172a">vacation-2024.mp4</text>
    <text x="100" y="52" font-size="11" fill="#64748b">发送至 华为 Mate 60</text>
    <text x="100" y="68" font-size="11" fill="#94a3b8">4.2 GB · 12 分钟前</text>
    <g transform="translate(100, 76)">
      <rect width="60" height="14" rx="4" fill="#dbeafe"/>
      <text x="30" y="11" text-anchor="middle" font-size="9" font-weight="700" fill="#0284c7">已完成</text>
    </g>
  </g>

  <!-- History item 3 -->
  <g transform="translate(22, 408)" filter="url(#card-shadow-h)">
    <rect width="331" height="100" rx="14" fill="#ffffff"/>
    <rect x="16" y="16" width="68" height="68" rx="12" fill="#f3e8ff"/>
    <text x="50" y="56" text-anchor="middle" font-size="28">📦</text>
    <text x="100" y="34" font-size="14" font-weight="700" fill="#0f172a">project-source.zip</text>
    <text x="100" y="52" font-size="11" fill="#64748b">收自 Office-PC</text>
    <text x="100" y="68" font-size="11" fill="#94a3b8">128 MB · 1 小时前</text>
    <g transform="translate(100, 76)">
      <rect width="60" height="14" rx="4" fill="#fef3c7"/>
      <text x="30" y="11" text-anchor="middle" font-size="9" font-weight="700" fill="#a16207">已解压</text>
    </g>
  </g>

  <!-- History item 4 -->
  <g transform="translate(22, 520)" filter="url(#card-shadow-h)">
    <rect width="331" height="100" rx="14" fill="#ffffff"/>
    <rect x="16" y="16" width="68" height="68" rx="12" fill="#e0e7ff"/>
    <text x="50" y="56" text-anchor="middle" font-size="28">📝</text>
    <text x="100" y="34" font-size="14" font-weight="700" fill="#0f172a">订单号 1923847562</text>
    <text x="100" y="52" font-size="11" fill="#64748b">发送至 DX 的 Mac</text>
    <text x="100" y="68" font-size="11" fill="#94a3b8">文本 · 昨天 14:23</text>
    <g transform="translate(100, 76)">
      <rect width="80" height="14" rx="4" fill="#dbeafe"/>
      <text x="40" y="11" text-anchor="middle" font-size="9" font-weight="700" fill="#0284c7">已复制粘贴</text>
    </g>
  </g>

  <!-- History item 5 partial -->
  <g transform="translate(22, 632)" filter="url(#card-shadow-h)">
    <rect width="331" height="80" rx="14" fill="#ffffff"/>
    <rect x="16" y="16" width="48" height="48" rx="10" fill="#f1f5f9"/>
    <text x="40" y="46" text-anchor="middle" font-size="20">📄</text>
    <text x="80" y="34" font-size="13" font-weight="600" fill="#0f172a">slides-2024-q4.pdf</text>
    <text x="80" y="52" font-size="11" fill="#94a3b8">3.2 MB · 昨天</text>
  </g>

  <!-- Tab bar -->
  <g transform="translate(0, 740)">
    <rect width="375" height="72" fill="#ffffff"/>
    <line x1="0" y1="0" x2="375" y2="0" stroke="#e2e8f0"/>
    <g transform="translate(58, 18)">
      <rect width="24" height="24" rx="4" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
      <text x="12" y="42" text-anchor="middle" font-size="10" fill="#94a3b8">设备</text>
    </g>
    <g transform="translate(176, 18)">
      <rect width="24" height="24" rx="4" fill="#0ea5e9" opacity="0.15"/>
      <text x="12" y="42" text-anchor="middle" font-size="10" font-weight="700" fill="#0ea5e9">传输</text>
    </g>
    <g transform="translate(294, 18)">
      <rect width="24" height="24" rx="4" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
      <text x="12" y="42" text-anchor="middle" font-size="10" fill="#94a3b8">设置</text>
    </g>
  </g>
</svg>
