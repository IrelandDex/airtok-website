<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 375 812" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">
  <defs>
    <linearGradient id="brand-d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="card-shadow-d" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="375" height="812" fill="#f8fafc"/>

  <!-- Status bar -->
  <g fill="#0f172a">
    <text x="28" y="28" font-size="14" font-weight="700">9:41</text>
    <!-- Cellular icon -->
    <g transform="translate(285, 18)">
      <rect x="0" y="6" width="3" height="6" rx="0.5"/>
      <rect x="5" y="4" width="3" height="8" rx="0.5"/>
      <rect x="10" y="2" width="3" height="10" rx="0.5"/>
      <rect x="15" y="0" width="3" height="12" rx="0.5"/>
    </g>
    <!-- WiFi -->
    <path d="M 310 24 Q 318 16 326 24" fill="none" stroke="#0f172a" stroke-width="2" stroke-linecap="round"/>
    <path d="M 312 28 Q 318 22 324 28" fill="none" stroke="#0f172a" stroke-width="2" stroke-linecap="round"/>
    <circle cx="318" cy="32" r="1.5"/>
    <!-- Battery -->
    <rect x="335" y="20" width="22" height="11" rx="2.5" fill="none" stroke="#0f172a" stroke-width="1"/>
    <rect x="337" y="22" width="16" height="7" rx="1"/>
    <rect x="358" y="23" width="2" height="5" rx="0.5"/>
  </g>

  <!-- Header -->
  <g>
    <text x="22" y="86" font-size="32" font-weight="800" fill="#0f172a">附近设备</text>
    <g transform="translate(22, 100)">
      <circle cx="5" cy="5" r="4" fill="#22c55e"/>
      <text x="15" y="9" font-size="13" fill="#64748b">3 台在线 · HOME-5G</text>
    </g>
    <!-- Refresh icon -->
    <g transform="translate(325, 78)">
      <circle cx="14" cy="14" r="14" fill="#ffffff" filter="url(#card-shadow-d)"/>
      <path d="M 8 14 A 6 6 0 1 0 14 8" fill="none" stroke="#0ea5e9" stroke-width="2" stroke-linecap="round"/>
      <path d="M 14 5 L 17 8 L 14 11" fill="none" stroke="#0ea5e9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Tab bar -->
  <g transform="translate(22, 130)">
    <rect width="331" height="40" rx="12" fill="#e2e8f0"/>
    <rect x="3" y="3" width="161" height="34" rx="10" fill="#ffffff" filter="url(#card-shadow-d)"/>
    <text x="83" y="25" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">附近设备</text>
    <text x="247" y="25" text-anchor="middle" font-size="13" font-weight="600" fill="#94a3b8">连接码</text>
  </g>

  <!-- Device card 1 -->
  <g transform="translate(22, 192)" filter="url(#card-shadow-d)">
    <rect width="331" height="92" rx="14" fill="#ffffff"/>
    <rect x="16" y="16" width="60" height="60" rx="14" fill="#e0f2fe"/>
    <g transform="translate(28, 28)">
      <rect width="36" height="36" rx="9" fill="#0ea5e9"/>
      <text x="18" y="24" text-anchor="middle" font-size="20">💻</text>
    </g>
    <text x="92" y="38" font-size="16" font-weight="700" fill="#0f172a">DX 的 Mac</text>
    <g transform="translate(92, 50)">
      <circle cx="4" cy="4" r="3" fill="#22c55e"/>
      <text x="12" y="7" font-size="11" fill="#64748b">在线 · 192.168.1.10</text>
    </g>
    <text x="92" y="78" font-size="10" font-weight="700" fill="#94a3b8">连接码 482917</text>
    <g transform="translate(266, 30)">
      <circle cx="16" cy="16" r="16" fill="#0ea5e9"/>
      <path d="M 11 16 L 21 16 M 17 12 L 21 16 L 17 20" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>
  </g>

  <!-- Device card 2 -->
  <g transform="translate(22, 304)" filter="url(#card-shadow-d)">
    <rect width="331" height="92" rx="14" fill="#ffffff"/>
    <rect x="16" y="16" width="60" height="60" rx="14" fill="#dcfce7"/>
    <g transform="translate(28, 28)">
      <rect width="36" height="36" rx="9" fill="#16a34a"/>
      <text x="18" y="24" text-anchor="middle" font-size="20">📱</text>
    </g>
    <text x="92" y="38" font-size="16" font-weight="700" fill="#0f172a">华为 Mate 60</text>
    <g transform="translate(92, 50)">
      <circle cx="4" cy="4" r="3" fill="#22c55e"/>
      <text x="12" y="7" font-size="11" fill="#64748b">在线 · 192.168.1.15</text>
    </g>
    <text x="92" y="78" font-size="10" font-weight="700" fill="#94a3b8">连接码 692401</text>
    <g transform="translate(266, 30)">
      <circle cx="16" cy="16" r="16" fill="#0ea5e9"/>
      <path d="M 11 16 L 21 16 M 17 12 L 21 16 L 17 20" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>
  </g>

  <!-- Device card 3 -->
  <g transform="translate(22, 416)" filter="url(#card-shadow-d)">
    <rect width="331" height="92" rx="14" fill="#ffffff"/>
    <rect x="16" y="16" width="60" height="60" rx="14" fill="#dbeafe"/>
    <g transform="translate(28, 28)">
      <rect width="36" height="36" rx="9" fill="#0078d4"/>
      <text x="18" y="24" text-anchor="middle" font-size="20">🖥</text>
    </g>
    <text x="92" y="38" font-size="16" font-weight="700" fill="#0f172a">Office-PC</text>
    <g transform="translate(92, 50)">
      <circle cx="4" cy="4" r="3" fill="#22c55e"/>
      <text x="12" y="7" font-size="11" fill="#64748b">在线 · 192.168.1.33</text>
    </g>
    <text x="92" y="78" font-size="10" font-weight="700" fill="#94a3b8">连接码 174203</text>
    <g transform="translate(266, 30)">
      <circle cx="16" cy="16" r="16" fill="#0ea5e9"/>
      <path d="M 11 16 L 21 16 M 17 12 L 21 16 L 17 20" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>
  </g>

  <!-- Self info card at bottom -->
  <g transform="translate(22, 600)">
    <rect width="331" height="100" rx="16" fill="url(#brand-d)"/>
    <text x="22" y="34" font-size="11" font-weight="700" fill="#ffffff" opacity="0.7">本机</text>
    <text x="22" y="58" font-size="18" font-weight="800" fill="#ffffff">DX 的 iPhone</text>
    <text x="22" y="78" font-size="11" fill="#ffffff" opacity="0.85">192.168.1.21 · iOS 18</text>
    <g transform="translate(220, 30)">
      <text x="0" y="11" font-size="10" font-weight="700" fill="#ffffff" opacity="0.7">连接码</text>
      <text x="0" y="40" font-size="22" font-weight="800" fill="#ffffff" letter-spacing="2">305817</text>
    </g>
  </g>

  <!-- Tab bar at bottom -->
  <g transform="translate(0, 740)">
    <rect width="375" height="72" fill="#ffffff"/>
    <line x1="0" y1="0" x2="375" y2="0" stroke="#e2e8f0"/>
    <g transform="translate(58, 18)">
      <rect width="24" height="24" rx="4" fill="#0ea5e9" opacity="0.15"/>
      <text x="12" y="42" text-anchor="middle" font-size="10" font-weight="700" fill="#0ea5e9">设备</text>
    </g>
    <g transform="translate(176, 18)">
      <rect width="24" height="24" rx="4" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
      <text x="12" y="42" text-anchor="middle" font-size="10" fill="#94a3b8">传输</text>
    </g>
    <g transform="translate(294, 18)">
      <rect width="24" height="24" rx="4" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
      <text x="12" y="42" text-anchor="middle" font-size="10" fill="#94a3b8">设置</text>
    </g>
  </g>
</svg>
